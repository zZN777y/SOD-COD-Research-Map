name: Add a paper
description: Suggest a SOD, COD, RGB-D, or SOD-COD paper.
title: "[Paper] "
labels: ["paper"]
body:
  - type: input
    id: title
    attributes:
      label: Paper title
      placeholder: "Paper title"
    validations:
      required: true
  - type: input
    id: venue
    attributes:
      label: Year and venue
      placeholder: "2026, CVPR"
    validations:
      required: true
  - type: dropdown
    id: task
    attributes:
      label: Main task
      multiple: true
      options:
        - SOD
        - COD
        - COS
        - SOD-COD
        - RGBD-SOD
        - RGBD-COD
        - VSOD
        - VCOD
    validations:
      required: true
  - type: input
    id: links
    attributes:
      label: Links
      placeholder: "Paper URL, code URL, project URL"
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why should this be included?
      placeholder: "One or two sentences about why the paper is useful."
    validations:
      required: true

